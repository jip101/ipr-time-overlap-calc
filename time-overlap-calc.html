<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Time Overlap Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
}

/* NEW: main layout constraint */
.app-container {
    width: 100%;
    max-width: 850px;
}

/* headings */
h2 { margin-top: 30px; }

/* tables */
table {
    border-collapse: collapse;
    width: 100%;
    background: white;
}

th, td {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: center;
}

th { background: #eee; }

/* colored row indicator */
.color-row {
    border-left: 6px solid transparent;
}

/* inputs */
input {
    width: 100%;
    padding: 6px 24px 6px 6px;
    text-align: center;
    box-sizing: border-box;
}

.time-wrapper {
    position: relative;
}

.time-preview {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    color: #bbb;
    font-size: 11px;
    pointer-events: none;
}

/* invalid row */
.invalid-row {
    background: #ffe6e6;
}

.invalid-row input {
    border: 1px solid red;
}

/* delete button */
.delete-btn {
    background: transparent;
    border: none;
    color: #999;
    font-size: 18px;
    cursor: pointer;
}

.delete-btn:hover {
    color: #e53935;
}

/* timeline */
.timeline {
    margin-top: 10px;
    background: #fff;
    border: 1px solid #ccc;
    padding: 10px;
}

.timeline-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
}

.timeline-name {
    width: 90px;
    font-size: 12px;
}

.timeline-bar {
    position: relative;
    flex: 1;
    height: 18px;
    background: #eee;
}

.block {
    position: absolute;
    height: 100%;
    opacity: 0.85;
}

.block.overlap {
    background: repeating-linear-gradient(
        45deg,
        rgba(0,0,0,0.25),
        rgba(0,0,0,0.25) 2px,
        transparent 2px,
        transparent 4px
    );
}

/* tooltip */
.tooltip {
    position: absolute;
    background: black;
    color: white;
    padding: 4px 6px;
    font-size: 11px;
    border-radius: 3px;
    pointer-events: none;
    white-space: nowrap;
    transform: translate(-50%, -120%);
    z-index: 10;
    opacity: 0;
}

button {
    padding: 8px 12px;
    margin: 8px 0;
    cursor: pointer;
}

.section {
    background: white;
    padding: 15px;
    border: 1px solid #ddd;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="app-container">

<h1>Time Overlap Calculator</h1>

<div class="section">
<h2>Morning</h2>
<table id="morningTable">
<thead>
<tr><th>Name</th><th>Start</th><th>End</th><th></th></tr>
</thead>
<tbody></tbody>
</table>
<button onclick="addRow('morningTable')">Add Row</button>
</div>

<div class="section">
<h2>Afternoon</h2>
<table id="afternoonTable">
<thead>
<tr><th>Name</th><th>Start</th><th>End</th><th></th></tr>
</thead>
<tbody></tbody>
</table>
<button onclick="addRow('afternoonTable')">Add Row</button>
</div>

<button onclick="calculate()">Calculate</button>

<h2>Results</h2>

<h3>Morning</h3>
<table id="morningResults">
<thead><tr><th>Name</th><th>Individual</th><th>Concurrent</th></tr></thead>
<tbody></tbody>
</table>
<div class="timeline" id="morningTimeline"></div>

<h3>Afternoon</h3>
<table id="afternoonResults">
<thead><tr><th>Name</th><th>Individual</th><th>Concurrent</th></tr></thead>
<tbody></tbody>
</table>
<div class="timeline" id="afternoonTimeline"></div>

<div id="tooltip" class="tooltip"></div>

</div>

<script>

const COLORS = [
"#4CAF50","#2196F3","#FF9800",
"#9C27B0","#E91E63","#009688",
"#795548","#3F51B5"
];

const tooltip = document.getElementById("tooltip");

// ---------- Row ----------
function createTimeInput(v=""){
return `
<div class="time-wrapper">
<input class="time-input" value="${v}" placeholder="HHMM">
<div class="time-preview"></div>
</div>`;
}

function addRow(id){
const tbody=document.querySelector(`#${id} tbody`);
const last=tbody.lastElementChild;

let s="",e="";
if(last){
const t=last.querySelectorAll(".time-input");
s=t[0].value;e=t[1].value;
}

const row=document.createElement("tr");
row.innerHTML=`
<td><input type="text"></td>
<td>${createTimeInput(s)}</td>
<td>${createTimeInput(e)}</td>
<td><button class="delete-btn">×</button></td>
`;

tbody.appendChild(row);
applyRowColors(id);
}

// init rows
for(let i=0;i<5;i++){
addRow("morningTable");
addRow("afternoonTable");
}

// ---------- Delete ----------
document.addEventListener("click", e => {
if(!e.target.classList.contains("delete-btn")) return;

const row = e.target.closest("tr");
const table = row.closest("table");

row.remove();
applyRowColors(table.id);
});

// ---------- Colors ----------
function applyRowColors(tableId){
const rows=document.querySelectorAll(`#${tableId} tbody tr`);

rows.forEach((row,i)=>{
const color=COLORS[i % COLORS.length];

row.classList.add("color-row");
row.style.borderLeft=`6px solid ${color}`;

const nameInput=row.children[0].querySelector("input");
nameInput.style.color=color;
});
}

// ---------- Time ----------
function formatTime(v){
v=v.replace(/\D/g,'');
if(!v)return "";
if(v.length<=2)return v.padStart(2,'0')+":00";
if(v.length===3)return v[0].padStart(2,'0')+":"+v.slice(1);
return v.slice(0,2)+":"+v.slice(2,4);
}

function toMin(t){
if(!t.includes(":"))return null;
let[a,b]=t.split(":").map(Number);
return a*60+b;
}

// ---------- Input ----------
document.addEventListener("input",e=>{
if(!e.target.classList.contains("time-input"))return;

e.target.parentElement.querySelector(".time-preview").textContent =
formatTime(e.target.value);

validateRow(e.target.closest("tr"));
});

document.addEventListener("blur",e=>{
if(!e.target.classList.contains("time-input"))return;

e.target.value=formatTime(e.target.value);
e.target.parentElement.querySelector(".time-preview").textContent="";

validateRow(e.target.closest("tr"));
},true);

// ---------- Validation ----------
function validateRow(r){
const t=r.querySelectorAll(".time-input");
const s=toMin(t[0].value),e=toMin(t[1].value);

r.classList.toggle("invalid-row", s!==null && e!==null && s>=e);
}

// ---------- Timeline ----------
function renderTimeline(people,id){
const el=document.getElementById(id);
el.innerHTML="";
if(!people.length)return;

const min=Math.min(...people.map(p=>p.start));
const max=Math.max(...people.map(p=>p.end));
const total=max-min;

people.forEach((p,i)=>{
const row=document.createElement("div");
row.className="timeline-row";

const name=document.createElement("div");
name.className="timeline-name";
name.textContent=p.name;
name.style.color=p.color;

const bar=document.createElement("div");
bar.className="timeline-bar";

const block=document.createElement("div");
block.className="block";
block.style.left=((p.start-min)/total*100)+"%";
block.style.width=((p.end-p.start)/total*100)+"%";
block.style.background=p.color;

// tooltip
block.onmousemove=(e)=>{
tooltip.textContent=`${p.name}: ${fmt(p.start)} - ${fmt(p.end)}`;
tooltip.style.left=e.pageX+"px";
tooltip.style.top=e.pageY+"px";
tooltip.style.opacity=1;
};
block.onmouseleave=()=>tooltip.style.opacity=0;

bar.appendChild(block);

// overlap stripes
for(let t=p.start;t<p.end;t++){
if(people.some((o,j)=>j!==i&&t>=o.start&&t<o.end)){
const o=document.createElement("div");
o.className="block overlap";
o.style.left=((t-min)/total*100)+"%";
o.style.width=(1/total*100)+"%";
bar.appendChild(o);
}
}

row.appendChild(name);
row.appendChild(bar);
el.appendChild(row);
});
}

function fmt(m){
return String(Math.floor(m/60)).padStart(2,'0')
+":"+String(m%60).padStart(2,'0');
}

// ---------- Calculate ----------
function calcSection(tableId,resultId,timelineId){
const rows=document.querySelectorAll(`#${tableId} tbody tr`);
let people=[];

rows.forEach((r,i)=>{
if(r.classList.contains("invalid-row"))return;

const name=r.children[0].querySelector("input").value.trim();
const t=r.querySelectorAll(".time-input");

const s=toMin(t[0].value),e=toMin(t[1].value);

if(name&&s!==null&&e!==null&&e>s){
people.push({
name,
start:s,
end:e,
color:COLORS[people.length%COLORS.length]
});
}
});

const tbody=document.querySelector(`#${resultId} tbody`);
tbody.innerHTML="";

people.forEach((p,i)=>{
let ind=0,con=0;

for(let t=p.start;t<p.end;t++){
let overlap=people.some((o,j)=>j!==i&&t>=o.start&&t<o.end);
overlap?con++:ind++;
}

const row=document.createElement("tr");
row.innerHTML=`
<td style="color:${p.color};font-weight:bold">${p.name}</td>
<td>${ind}</td>
<td>${con}</td>
`;
tbody.appendChild(row);
});

renderTimeline(people,timelineId);
}

function calculate(){
calcSection("morningTable","morningResults","morningTimeline");
calcSection("afternoonTable","afternoonResults","afternoonTimeline");
}

</script>
</body>
</html>
